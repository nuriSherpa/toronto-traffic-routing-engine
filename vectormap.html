<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transit Map – Toronto (Vector Tiles + Stop Details)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      :root {
        --panel-bg: #1e1e2e;
        --panel-text: #e0e0e0;
        --accent: #f59e0b;
        --divider: #333348;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: #12121c;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }
      #map {
        height: 100%;
        width: 100%;
        z-index: 1;
        background: #f2f2f2;
      }
      #sidebar {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1000;
        background: var(--panel-bg);
        color: var(--panel-text);
        border-radius: 14px;
        padding: 20px 16px 16px;
        width: 300px;
        max-height: calc(100vh - 24px);
        overflow-y: auto;
        border: 1px solid var(--divider);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #sidebar h2 {
        font-size: 1.15rem;
        font-weight: 700;
        color: #fff;
      }
      #sidebar .subtitle {
        font-size: 0.75rem;
        color: #999;
        margin-top: -6px;
      }
      #sidebar .divider {
        height: 1px;
        background: var(--divider);
        border: none;
      }
      #route-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #route-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
        user-select: none;
        font-size: 0.85rem;
      }
      #route-list li:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .route-swatch {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.7rem;
        border: 2px solid transparent;
      }
      .route-name {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .route-badge {
        font-size: 0.7rem;
        background: rgba(255, 255, 255, 0.1);
        padding: 3px 7px;
        border-radius: 10px;
        color: #aaa;
      }
      #stats {
        font-size: 0.72rem;
        color: #777;
        text-align: center;
        margin-top: 2px;
      }
      #clear-selection-btn {
        padding: 8px 0;
        border-radius: 8px;
        border: 1px solid var(--divider);
        background: transparent;
        color: #ccc;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        transition: all 0.2s;
        text-align: center;
      }
      #clear-selection-btn:hover {
        background: rgba(255, 255, 255, 0.05);
      }
      .stop-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid white;
        display: block;
      }
      @media (max-width: 600px) {
        #sidebar {
          width: 230px;
          padding: 14px 10px 12px;
          left: 6px;
          top: 6px;
          max-height: calc(100vh - 12px);
          border-radius: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <aside id="sidebar">
      <h2>🚇 Transit Map</h2>
      <p class="subtitle">Click a route (map or list) to see stops</p>
      <hr class="divider" />
      <button id="clear-selection-btn">Clear selection</button>
      <hr class="divider" />
      <ul id="route-list"></ul>
      <hr class="divider" />
      <p id="stats"></p>
    </aside>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
    <script>
      // --- Compatibility shim: leaflet.vectorgrid@1.3.0 still calls
      // L.DomEvent.fakeStop(), an internal API that was removed from
      // modern Leaflet (1.8+). Without this, clicking a route on the map
      // throws "L.DomEvent.fakeStop is not a function" and click-to-select
      // never fires. This restores just enough of the old behavior: mark
      // the event as already-handled so Leaflet doesn't double-fire a
      // synthetic click after a touch/click on the canvas renderer.
      if (typeof L !== 'undefined' && L.DomEvent && !L.DomEvent.fakeStop) {
        L.DomEvent.fakeStop = function (e) {
          e._stopped = true;
          return this;
        };
      }
    </script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script>
      (function () {
        const API_BASE = 'http://localhost:3000/api/v1';
        const TILES_URL = `${API_BASE}/tiles/{z}/{x}/{y}.mvt`;
        const ROUTE_LIST_URL = `${API_BASE}/routes`;
        const routeFullUrl = (id) => `${API_BASE}/routes/${encodeURIComponent(id)}/full`;

        const routeListEl = document.getElementById('route-list');
        const statsEl = document.getElementById('stats');
        const clearSelectionBtn = document.getElementById('clear-selection-btn');

        let routesList = [];
        let selectedRouteId = null; // currently highlighted route
        let selectedRouteData = null; // full data of selected route
        let selectedLayers = L.layerGroup(); // holds highlight polyline + stop markers

        const map = L.map('map', {
          center: [43.7, -79.4],
          zoom: 12,
          maxBounds: [
            [43.58, -79.64],
            [43.86, -79.12],
          ],
        });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OSM contributors &copy; CARTO',
          maxZoom: 19,
        }).addTo(map);

        // ---------- Vector tile layer (all routes) ----------
        const vectorTileLayer = L.vectorGrid
          .protobuf(TILES_URL, {
            rendererFactory: L.canvas.tile,
            maxNativeZoom: 16, // match your tile generation max zoom
            minZoom: 10, // routes only visible from zoom 10
            vectorTileLayerStyles: {
              transit_routes: function (properties, zoom) {
                const color = properties.color ? '#' + properties.color : '#888';
                const weight = properties.route_type == 1 ? 4 : 2.5;
                return {
                  color: color,
                  weight: weight,
                  opacity: 0.85,
                  lineCap: 'round',
                  lineJoin: 'round',
                };
              },
            },
            interactive: true, // enable click events on features
            getFeatureId: function (feature) {
              // Ensure each feature has a unique ID for click handling
              return feature.properties.route_id;
            },
          })
          .addTo(map);

        // ---------- Click on a tile feature → load and show stops ----------
        vectorTileLayer.on('click', function (e) {
          const props = e.layer.properties;
          if (!props || !props.route_id) return;
          const routeId = String(props.route_id);
          selectRoute(routeId);
        });

        // ---------- Route selection logic ----------
        async function selectRoute(routeId) {
          // Avoid reload if already selected
          if (selectedRouteId === routeId && selectedRouteData) {
            // maybe just zoom to the existing layers
            map.fitBounds(selectedLayers.getBounds().pad(0.1));
            return;
          }
          clearSelection(); // remove previous highlight

          try {
            const data = await fetchJson(routeFullUrl(routeId));
            selectedRouteId = routeId;
            selectedRouteData = data;
            renderSelectedRoute(data);
            updateSidebarHighlight(routeId);
          } catch (err) {
            alert('Failed to load route details: ' + err.message);
          }
        }

        function renderSelectedRoute(fullData) {
          const color = fullData.color ? '#' + fullData.color : '#ff0';
          const routeGroup = L.layerGroup();

          // Draw highlighted shapes (thicker) for all itineraries
          (fullData.itineraries || []).forEach((it) => {
            if (it.shape && it.shape.coordinates) {
              let coords =
                it.shape.type === 'MultiLineString'
                  ? it.shape.coordinates[0].map((c) => [c[0], c[1]])
                  : it.shape.coordinates.map((c) => [c[0], c[1]]);
              const latlngs = coords.map((c) => [c[1], c[0]]);
              L.polyline(latlngs, {
                color: color,
                weight: 6,
                opacity: 0.9,
                lineCap: 'round',
                lineJoin: 'round',
              }).addTo(routeGroup);
            }
          });

          // Merge and display stops (snap to a shape if subway)
          const shapeCoords = getRepresentativeShape(fullData);
          const stops =
            fullData.route_type === 1
              ? mergeSubwayStops(fullData, shapeCoords)
              : flattenAllStops(fullData);

          stops.forEach((stop) => {
            const lat = parseFloat(stop.lat);
            const lon = parseFloat(stop.lon);
            if (isNaN(lat) || isNaN(lon)) return;

            const dotEl = document.createElement('div');
            dotEl.className = 'stop-dot';
            dotEl.style.backgroundColor = color;
            const borderColor = getContrastColor(color) === '#000000' ? '#333' : '#fff';
            dotEl.style.borderColor = borderColor;
            const icon = L.divIcon({
              html: dotEl.outerHTML,
              className: '',
              iconSize: [10, 10],
              iconAnchor: [5, 5],
            });

            const marker = L.marker([lat, lon], { icon }).bindTooltip(
              `<strong>${stop.name || 'Stop'}</strong>`,
              { direction: 'top' },
            ).bindPopup(`
              <div style="font-family:sans-serif;min-width:180px;">
                <strong>${stop.name || 'Stop'}</strong>
                ${stop.parent_station_name ? `<br><small>🏛 ${stop.parent_station_name}</small>` : ''}
                <br><small>📍 ${lat.toFixed(5)}, ${lon.toFixed(5)}</small>
              </div>`);
            routeGroup.addLayer(marker);
          });

          routeGroup.addTo(map);
          selectedLayers = routeGroup;
          map.fitBounds(routeGroup.getBounds().pad(0.1));
          statsEl.textContent = `Showing ${stops.length} stops for route ${fullData.short_name || fullData.global_route_id}`;
        }

        function clearSelection() {
          if (selectedLayers) map.removeLayer(selectedLayers);
          selectedLayers = L.layerGroup();
          selectedRouteId = null;
          selectedRouteData = null;
          statsEl.textContent = '';
          updateSidebarHighlight(null);
        }

        // ---------- Helper: get a representative shape for snapping ----------
        function getRepresentativeShape(fullData) {
          for (const it of fullData.itineraries || []) {
            if (it.shape && it.shape.coordinates) {
              return it.shape.type === 'MultiLineString'
                ? it.shape.coordinates[0].map((c) => [c[0], c[1]])
                : it.shape.coordinates.map((c) => [c[0], c[1]]);
            }
          }
          return null;
        }

        function mergeSubwayStops(fullData, shapeCoords) {
          const stationMap = new Map();
          (fullData.itineraries || []).forEach((it) => {
            if (!it.stops) return;
            it.stops.forEach((stop) => {
              const key = stop.parent_station || stop.global_stop_id;
              if (!stationMap.has(key)) {
                stationMap.set(key, { coords: [], representative: stop });
              }
              stationMap.get(key).coords.push([parseFloat(stop.lat), parseFloat(stop.lon)]);
            });
          });
          const merged = [];
          for (const [key, entry] of stationMap) {
            const coords = entry.coords;
            if (coords.length === 0) continue;
            const sumLat = coords.reduce((s, c) => s + c[0], 0);
            const sumLon = coords.reduce((s, c) => s + c[1], 0);
            let midLat = sumLat / coords.length;
            let midLon = sumLon / coords.length;
            if (shapeCoords && shapeCoords.length >= 2) {
              try {
                const line = turf.lineString(shapeCoords);
                const snapped = turf.nearestPointOnLine(line, turf.point([midLon, midLat]), {
                  units: 'meters',
                });
                midLon = snapped.geometry.coordinates[0];
                midLat = snapped.geometry.coordinates[1];
              } catch (e) {}
            }
            merged.push({
              ...entry.representative,
              lat: midLat,
              lon: midLon,
              name: entry.representative.parent_station_name || entry.representative.name,
            });
          }
          return merged;
        }

        function flattenAllStops(fullData) {
          const stops = [];
          (fullData.itineraries || []).forEach((it) => {
            (it.stops || []).forEach((s) => stops.push(s));
          });
          return stops;
        }

        function getContrastColor(hex) {
          if (!hex) return '#ffffff';
          hex = hex.replace('#', '');
          if (hex.length === 3) hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
          const r = parseInt(hex.substring(0, 2), 16);
          const g = parseInt(hex.substring(2, 4), 16);
          const b = parseInt(hex.substring(4, 6), 16);
          return (r * 299 + g * 587 + b * 114) / 1000 >= 128 ? '#000000' : '#ffffff';
        }

        // ---------- Sidebar route list (click to select) ----------
        async function buildRouteList() {
          try {
            const data = await fetchJson(ROUTE_LIST_URL);
            routesList = data;
            routeListEl.innerHTML = '';
            data
              .sort((a, b) =>
                a.route_type === 1 ? -1 : b.route_type === 1 ? 1 : a.route_type - b.route_type,
              )
              .forEach((route) => {
                const rid = String(route.global_route_id);
                const colorHex = route.color ? '#' + route.color : '#888';
                const textHex = route.text_color
                  ? '#' + route.text_color
                  : getContrastColor(colorHex);
                const li = document.createElement('li');
                li.dataset.routeId = rid;
                li.innerHTML = `
                <span class="route-swatch" style="background:${colorHex};color:${textHex};">
                  ${(route.short_name || route.long_name || '?').charAt(0).toUpperCase()}
                </span>
                <span class="route-name">${route.short_name || route.long_name || rid}</span>
                <span class="route-badge">${route.mode_name || ''}</span>`;
                li.addEventListener('click', () => selectRoute(rid));
                routeListEl.appendChild(li);
              });
          } catch (err) {
            routeListEl.innerHTML = '<li>Could not load route list</li>';
          }
        }

        function updateSidebarHighlight(routeId) {
          document.querySelectorAll('#route-list li').forEach((li) => {
            if (li.dataset.routeId === routeId) {
              li.style.background = 'rgba(255,255,255,0.1)';
            } else {
              li.style.background = '';
            }
          });
        }

        clearSelectionBtn.addEventListener('click', clearSelection);

        async function fetchJson(url) {
          const resp = await fetch(url);
          let payload = null;
          try {
            payload = await resp.json();
          } catch (e) {}
          if (!resp.ok || !payload || payload.success === false) {
            throw new Error(payload?.error?.message || `HTTP ${resp.status}`);
          }
          return payload.data;
        }

        // ---------- Initialize ----------
        buildRouteList();
        statsEl.textContent = 'Click any route line or list item to see stops';
      })();
    </script>
  </body>
</html>
