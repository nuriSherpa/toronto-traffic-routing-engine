<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Toronto Roads – Dark, Google Maps Style</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: sans-serif;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      #info {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1;
        background: rgba(0, 0, 0, 0.85);
        color: #eee;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        max-width: 340px;
        line-height: 1.4;
      }
      .ok {
        color: #7ee787;
      }
      .err {
        color: #ff7b72;
      }
      .warn {
        color: #ffd166;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <div><span id="status">Loading…</span></div>
      <div>Check console (F12) for logs.</div>
    </div>
    <div id="map"></div>
    <script>
      const TILE_BASE = 'http://localhost:3002';

      const map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          glyphs: 'https://fonts.undpgeohub.org/fonts/{fontstack}/{range}.pbf',
          sources: {},
          layers: [{ id: 'bg', type: 'background', paint: { 'background-color': '#1d2126' } }],
        },
        center: [-79.38, 43.71],
        zoom: 11,
      });
      map.addControl(new maplibregl.NavigationControl(), 'top-right');

      const ROAD_CLASSES = [
        { key: 'expressway', match: ['Expressway', 'Expressway Ramp'] },
        { key: 'major', match: ['Major Arterial', 'Major Arterial Ramp'] },
        { key: 'minor', match: ['Minor Arterial', 'Minor Arterial Ramp'] },
        { key: 'collector', match: ['Collector', 'Collector Ramp'] },
        { key: 'local', match: ['Local', 'Local Ramp', 'Laneway'] },
      ];

      // Subtle grey palette – no orange, just like Google Maps dark mode
      const STYLE_BY_CLASS = {
        expressway: { fill: '#9aa0a6', width: [0.4, 0.6, 1.0, 2.0, 4.0, 8] },
        major: { fill: '#8a8f94', width: [0, 0.4, 0.8, 1.6, 3.5, 7] },
        minor: { fill: '#7a7f84', width: [0, 0, 0.5, 1.2, 2.8, 5.5] },
        collector: { fill: '#6a6f74', width: [0, 0, 0, 0.8, 2.0, 4.5] },
        local: { fill: '#5a5f64', width: [0, 0, 0, 0.4, 1.2, 3.5] },
      };

      const LABEL_MINZOOM = {
        expressway: 8,
        major: 11,
        minor: 13,
        collector: 14,
        local: 15,
      };

      function widthExpr(w) {
        return [
          'interpolate',
          ['linear'],
          ['zoom'],
          3,
          w[0],
          6,
          w[1],
          9,
          w[2],
          12,
          w[3],
          15,
          w[4],
          18,
          w[5],
        ];
      }

      map.on('load', async () => {
        const statusEl = document.getElementById('status');

        try {
          const res = await fetch(`${TILE_BASE}/roads_mvt`);
          if (!res.ok) throw new Error(`TileJSON fetch failed: ${res.status}`);
          const tilejson = await res.json();
          console.log('TileJSON:', tilejson);
          statusEl.textContent = 'TileJSON loaded.';

          map.addSource('roads', {
            type: 'vector',
            tiles: tilejson.tiles,
            bounds: tilejson.bounds,
            minzoom: tilejson.minzoom || 0,
            maxzoom: tilejson.maxzoom || 20,
          });

          // Draw from local (bottom) up to expressway (top)
          const drawOrder = [...ROAD_CLASSES].reverse();
          drawOrder.forEach(({ key, match }) => {
            const s = STYLE_BY_CLASS[key];
            const filter = ['in', ['get', 'feature_code_desc'], ['literal', match]];
            map.addLayer({
              id: `roads-${key}-fill`,
              type: 'line',
              source: 'roads',
              'source-layer': 'roads',
              filter,
              layout: { 'line-cap': 'round', 'line-join': 'round' },
              paint: {
                'line-color': s.fill,
                'line-width': widthExpr(s.width),
              },
            });
          });

          // Buildings (3D) – will appear once Martin is configured (see notes)
          map.addSource('buildings', {
            type: 'vector',
            tiles: ['http://localhost:3002/buildings_mvt/{z}/{x}/{y}.pbf'],
            minzoom: 12,
            maxzoom: 20,
          });
          map.addLayer({
            id: 'buildings-3d',
            type: 'fill-extrusion',
            source: 'buildings',
            'source-layer': 'buildings',
            minzoom: 14,
            paint: {
              'fill-extrusion-color': '#3a3f45',
              'fill-extrusion-height': [
                'coalesce',
                ['get', 'height'],
                ['*', ['get', 'levels'], 3],
                6,
              ],
              'fill-extrusion-opacity': 0.85,
            },
          });
          map.addLayer({
            id: 'buildings-label',
            type: 'symbol',
            source: 'buildings',
            'source-layer': 'buildings',
            minzoom: 15,
            layout: {
              'symbol-placement': 'point',
              'text-field': [
                'coalesce',
                ['get', 'name'],
                [
                  'case',
                  ['all', ['has', 'housenumber'], ['has', 'street']],
                  ['concat', ['get', 'housenumber'], ' ', ['get', 'street']],
                  ['to-string', ['get', 'id']],
                ],
              ],
              'text-font': ['Open Sans Regular'],
              'text-size': 12,
              'text-allow-overlap': false,
            },
            paint: {
              'text-color': '#ffffff',
              'text-halo-color': '#000000',
              'text-halo-width': 1.2,
            },
          });

          // Labels
          ROAD_CLASSES.forEach(({ key, match }) => {
            map.addLayer({
              id: `roads-${key}-label`,
              type: 'symbol',
              source: 'roads',
              'source-layer': 'roads',
              minzoom: LABEL_MINZOOM[key],
              filter: ['in', ['get', 'feature_code_desc'], ['literal', match]],
              layout: {
                'symbol-placement': 'line',
                'symbol-spacing': 250,
                'text-field': [
                  'coalesce',
                  ['get', 'linear_name_full'],
                  ['get', 'linear_name_label'],
                  '',
                ],
                'text-font': ['Open Sans Regular'],
                'text-size': ['interpolate', ['linear'], ['zoom'], LABEL_MINZOOM[key], 10, 18, 14],
                'text-max-angle': 30,
              },
              paint: {
                'text-color': '#e6e6e6',
                'text-halo-color': '#000000',
                'text-halo-width': 1.2,
              },
            });
          });

          // Quick diagnostic
          map.once('sourcedata', (e) => {
            if (e.sourceId === 'roads' && e.isSourceLoaded) {
              const feats = map.querySourceFeatures('roads', { sourceLayer: 'roads' });
              if (feats.length) {
                statusEl.innerHTML = `✓ ${feats.length} road features visible.`;
                statusEl.className = 'ok';
              }
            }
          });
        } catch (err) {
          statusEl.textContent = '✗ ' + err.message;
          statusEl.className = 'err';
          console.error(err);
        }
      });
    </script>
  </body>
</html>
